name: Postar ofertas

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12,14,16,18,20,22 * * *"  # 9h às 19h (Brasília), a cada 2h

permissions:
  contents: write

jobs:
  postar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Buscar ofertas novas (Promobit)
        run: python buscador.py

      - name: Publicar ofertas pendentes no Telegram
        run: python postar.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Salvar estado
        run: |
          git config user.name "ezofertas-bot"
          git config user.email "bot@ezhub.local"
          git add -A
          git diff --cached --quiet || git commit -m "ofertas publicadas [skip ci]"
          git push
